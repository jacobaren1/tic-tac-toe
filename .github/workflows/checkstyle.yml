name: Checkstyle

on:
  push: {}
  pull_request:
    branches: [main]

jobs:
  checkstyle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - name: Download Checkstyle
        run: |
          curl -L -o checkstyle.jar \
            https://github.com/checkstyle/checkstyle/releases/download/checkstyle-13.6.0/checkstyle-13.6.0-all.jar
      - name: Run Checkstyle
        run: |
          java -jar checkstyle.jar -c /google_checks.xml TicTacToe.java
